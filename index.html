<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NANZ PANEL</title>

<style>

body{
font-family: Arial;
background: radial-gradient(circle,#1a1a2e,#0f0f1a);
color:white;
margin:0;
padding:0;
}

header{
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
background:#0f0f1a;
box-shadow:0 0 20px #000;
}

.container{
display:flex;
gap:20px;
padding:20px;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:12px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.create{
width:320px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1c1c2b;
color:white;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#00ff9c;
color:black;
font-weight:bold;
cursor:pointer;
width:100%;
}

button:hover{
opacity:0.8;
}

.userlist{
flex:1;
}

.user{
background:#151525;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.actions button{
margin-left:5px;
width:auto;
padding:8px 10px;
background:#ff4d4d;
color:white;
}

.copy{
background:#00aaff;
}

</style>
</head>

<body>

<header>
NANZ USER PANEL
</header>

<div class="container">

<div class="card create">

<h3>Create Account</h3>

<input id="username" placeholder="Username (ex: Nanz)">
<input id="expiry" placeholder="Expiry dd/mm/yyyy">
<input id="devices" type="number" placeholder="Total Devices">

<button onclick="createAccount()">CREATE ACCOUNT</button>

</div>


<div class="card userlist">

<h3>User List</h3>

<div id="users"></div>

</div>

</div>


<script>

const DB = "https://senn-1d763-default-rtdb.firebaseio.com/users";

function rand(){
return Math.floor(1000 + Math.random()*9000);
}

function parseDate(str){
let p=str.split("/");
return new Date(p[2],p[1]-1,p[0]);
}

function today(){

let d=new Date();
d.setHours(0,0,0,0);
return d;

}

async function createAccount(){

let u=document.getElementById("username").value.trim();
let e=document.getElementById("expiry").value.trim();
let d=document.getElementById("devices").value;

if(!u||!e||!d){
alert("Isi semua data");
return;
}

if(parseDate(e) < today()){
alert("Tanggal tidak boleh kemarin");
return;
}

let username=`${u}-${rand()}-${rand()}`;
let password=`${u}-${rand()}-${rand()}`;

let data={
expiry:e,
hwids:{place_holder:true},
max_devices:parseInt(d),
password:password
};

await fetch(`${DB}/${username}.json`,{
method:"PUT",
body:JSON.stringify(data)
});

alert("Akun dibuat!");

loadUsers();

}

async function loadUsers(){

let res=await fetch(`${DB}.json`);
let data=await res.json();

let html="";

for(let user in data){

let u=data[user];

html+=`

<div class="user">

<div>

<b>${user}</b><br>

Expiry: ${u.expiry}<br>
Devices: ${u.max_devices}

</div>

<div class="actions">

<button class="copy" onclick="copy('${user}')">COPY USER</button>

<button class="copy" onclick="copy('${u.password}')">COPY PASS</button>

<button onclick="deleteUser('${user}')">DELETE</button>

</div>

</div>

`;

}

document.getElementById("users").innerHTML=html;

}

function copy(text){

navigator.clipboard.writeText(text);

alert("Copied: "+text);

}

async function deleteUser(user){

if(!confirm("Delete "+user+" ?"))return;

await fetch(`${DB}/${user}.json`,{
method:"DELETE"
});

loadUsers();

}

loadUsers();

</script>

</body>
</html>
