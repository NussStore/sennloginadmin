<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NANZ USER PANEL</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f0f1a;
color:white;
margin:0;
padding:0;
}

header{
text-align:center;
font-size:22px;
padding:15px;
font-weight:bold;
background:#151525;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.card{
background:#1a1a2b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

h3{
margin-top:0;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#2a2a40;
color:white;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00ff9c;
color:black;
font-weight:bold;
margin-top:5px;
}

.user{
background:#111122;
padding:12px;
border-radius:8px;
margin-top:10px;
}

.actions{
margin-top:8px;
display:flex;
gap:5px;
}

.actions button{
flex:1;
background:#00aaff;
color:white;
font-size:12px;
}

.delete{
background:#ff4d4d !important;
}

</style>
</head>

<body>

<header>
NANZ USER PANEL
</header>

<div class="container">

<div class="card">

<h3>Create Account</h3>

<input id="username" placeholder="Username">

<input id="expiry" type="date">

<input id="devices" type="number" placeholder="Devices">

<button onclick="createAccount()">CREATE ACCOUNT</button>

</div>

<div class="card">

<h3>User List</h3>

<div id="users"></div>

</div>

</div>


<script>

const DB="https://senn-1d763-default-rtdb.firebaseio.com/users";

function rand(){
return Math.floor(1000+Math.random()*9000);
}

function formatDate(date){

let d=new Date(date);

let day=("0"+d.getDate()).slice(-2);
let month=("0"+(d.getMonth()+1)).slice(-2);
let year=d.getFullYear();

return `${day}/${month}/${year}`;

}

function setMinDate(){

let today=new Date();
let yyyy=today.getFullYear();
let mm=("0"+(today.getMonth()+1)).slice(-2);
let dd=("0"+today.getDate()).slice(-2);

document.getElementById("expiry").min=`${yyyy}-${mm}-${dd}`;

}

async function createAccount(){

let base=document.getElementById("username").value.trim();
let expiry=document.getElementById("expiry").value;
let devices=document.getElementById("devices").value;

if(!base||!expiry||!devices){
alert("Isi semua data");
return;
}

let username=`${base}-${rand()}-${rand()}`;
let password=`${base}-${rand()}-${rand()}`;

let data={
expiry:formatDate(expiry),
hwids:{place_holder:true},
max_devices:parseInt(devices),
password:password
};

await fetch(`${DB}/${username}.json`,{
method:"PUT",
body:JSON.stringify(data)
});

alert("Akun berhasil dibuat");

loadUsers();

}

async function loadUsers(){

let res=await fetch(`${DB}.json`);
let data=await res.json();

let html="";

for(let user in data){

let u=data[user];

html+=`
<div class="user">

<b>${user}</b><br>

${u.password}<br>

Expiry : ${u.expiry}<br>

Devices : ${u.max_devices}

<div class="actions">

<button onclick="copy('${user}')">COPY USER</button>

<button onclick="copy('${u.password}')">COPY PASS</button>

<button class="delete" onclick="deleteUser('${user}')">DELETE</button>

</div>

</div>
`;

}

document.getElementById("users").innerHTML=html;

}

function copy(text){

navigator.clipboard.writeText(text);

alert("Copied");

}

async function deleteUser(user){

if(!confirm("Delete user?")) return;

await fetch(`${DB}/${user}.json`,{
method:"DELETE"
});

loadUsers();

}

setMinDate();
loadUsers();

</script>

</body>
</html>
