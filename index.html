<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NANZ USER PANEL</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:monospace;
background:#050510;
color:#00ff9c;
margin:0;
}

header{
text-align:center;
padding:15px;
font-size:22px;
background:#000;
box-shadow:0 0 10px #00ff9c;
}

.container{
padding:15px;
max-width:600px;
margin:auto;
}

.card{
background:#0a0a1a;
border:1px solid #00ff9c;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 0 10px #00ff9c33;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:10px;
border:none;
border-radius:6px;
background:#020210;
color:#00ff9c;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#00ff9c;
color:black;
font-weight:bold;
cursor:pointer;
}

.stats{
font-size:16px;
margin-bottom:10px;
}

.user{
border:1px solid #00ff9c33;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.actions{
display:flex;
gap:5px;
margin-top:8px;
}

.actions button{
flex:1;
font-size:11px;
}

.delete{
background:#ff4444;
color:white;
}

.edit{
background:#ffaa00;
}

.denied{
text-align:center;
margin-top:100px;
font-size:20px;
color:red;
}

</style>
</head>

<body>

<div id="app" style="display:none;">

<header>
NANZ USER PANEL
</header>

<div class="container">

<div class="card">

<h3>Create Account</h3>

<input id="username" placeholder="Username">

<select id="expiryType">
<option value="manual">Manual Expiry</option>
<option value="7">Auto 7 Days</option>
<option value="30">Auto 30 Days</option>
</select>

<input id="expiry" type="date">

<input id="devices" type="number" placeholder="Devices">

<button onclick="createAccount()">CREATE ACCOUNT</button>

</div>


<div class="card">

<div class="stats">
Total Users : <span id="total">0</span>
</div>

<input id="search" placeholder="Search user..." oninput="renderUsers()">

<div id="users"></div>

</div>

</div>

</div>

<div id="denied" class="denied" style="display:none;">
ACCESS DENIED<br>
IP NOT AUTHORIZED
</div>


<script>

const DB="https://senn-1d763-default-rtdb.firebaseio.com/users";

let allUsers={};

async function checkIP(){

let ipData=await fetch("https://api.ipify.org?format=json");
let ip=await ipData.json();

let izin=await fetch("izin.json");
let list=await izin.json();

if(list.allowed_ips.includes(ip.ip)){

document.getElementById("app").style.display="block";
loadUsers();

}else{

document.getElementById("denied").style.display="block";

}

}

function rand(){
return Math.floor(1000+Math.random()*9000);
}

function formatDate(date){

let d=new Date(date);

let day=("0"+d.getDate()).slice(-2);
let month=("0"+(d.getMonth()+1)).slice(-2);
let year=d.getFullYear();

return `${day}/${month}/${year}`;

}

function addDays(days){

let d=new Date();
d.setDate(d.getDate()+days);
return formatDate(d);

}

async function createAccount(){

let base=document.getElementById("username").value.trim();
let expiryType=document.getElementById("expiryType").value;
let expiryInput=document.getElementById("expiry").value;
let devices=document.getElementById("devices").value;

if(!base||!devices){
alert("Isi data");
return;
}

let expiry;

if(expiryType=="7") expiry=addDays(7);
else if(expiryType=="30") expiry=addDays(30);
else{

if(!expiryInput){
alert("Isi expiry");
return;
}

expiry=formatDate(expiryInput);

}

let username=`${base}-${rand()}-${rand()}`;
let password=`${base}-${rand()}-${rand()}`;

let data={
expiry:expiry,
hwids:{place_holder:true},
max_devices:parseInt(devices),
password:password
};

await fetch(`${DB}/${username}.json`,{
method:"PUT",
body:JSON.stringify(data)
});

alert("User created");

loadUsers();

}

async function loadUsers(){

let res=await fetch(`${DB}.json`);
let data=await res.json();

if(!data) data={};

allUsers=data;

document.getElementById("total").innerText=Object.keys(data).length;

renderUsers();

}

function renderUsers(){

let search=document.getElementById("search").value.toLowerCase();

let html="";

for(let user in allUsers){

if(!user.toLowerCase().includes(search)) continue;

let u=allUsers[user];

html+=`
<div class="user">

<b>${user}</b><br>

${u.password}<br>

Expiry : ${u.expiry}<br>

Devices : ${u.max_devices}

<div class="actions">

<button onclick="copy('${user}')">COPY USER</button>

<button onclick="copy('${u.password}')">COPY PASS</button>

<button class="edit" onclick="editExpiry('${user}')">EDIT EXP</button>

<button class="delete" onclick="deleteUser('${user}')">DELETE</button>

</div>

</div>
`;

}

document.getElementById("users").innerHTML=html;

}

function copy(text){

navigator.clipboard.writeText(text);

alert("Copied");

}

async function deleteUser(user){

if(!confirm("Delete user?")) return;

await fetch(`${DB}/${user}.json`,{
method:"DELETE"
});

loadUsers();

}

async function editExpiry(user){

let newExp=prompt("New expiry (dd/mm/yyyy)");

if(!newExp) return;

await fetch(`${DB}/${user}.json`,{
method:"PATCH",
body:JSON.stringify({
expiry:newExp
})
});

loadUsers();

}

checkIP();

</script>

</body>
</html>
